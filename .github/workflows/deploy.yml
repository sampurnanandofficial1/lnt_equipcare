name: Deploy L&T Equipcare to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         lntcmmb-intelligence.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          lntcmmb-intelligence
          VITE_FIREBASE_STORAGE_BUCKET:      lntcmmb-intelligence.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "37497109814"
          VITE_FIREBASE_APP_ID:              1:37497109814:web:eec6c70fc99f8264c6c797
          VITE_FIREBASE_MEASUREMENT_ID:      G-M3NH5FDXZ1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Debug — list accessible projects
        run: firebase projects:list
        continue-on-error: true

      - name: Debug — show project from SA
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    print('Project ID from SA:', data.get('project_id','NOT FOUND'))
    print('SA email:', data.get('client_email','NOT FOUND'))
except Exception as e:
    print('Parse error:', e)
"
        continue-on-error: true

      - name: Deploy to Firebase Hosting
        run: |
          PROJECT=$(echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('project_id','lntcmmb-intelligence1'))")
          echo "Deploying to project: $PROJECT"
          firebase deploy --only hosting --project "$PROJECT"

      - name: Confirm live URL
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅  LIVE: https://lntcmmb-equipcare.web.app"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
