name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         lntcmmb-intelligence.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          lntcmmb-intelligence
          VITE_FIREBASE_STORAGE_BUCKET:      lntcmmb-intelligence.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "37497109814"
          VITE_FIREBASE_APP_ID:              1:37497109814:web:eec6c70fc99f8264c6c797
          VITE_FIREBASE_MEASUREMENT_ID:      G-M3NH5FDXZ1

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Deploy and capture output
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/sa.json')).get('project_id'))")
          echo "Project: $PROJECT"
          firebase hosting:sites:create lntcmmb-equipcare --project "$PROJECT" 2>&1 || true
          firebase deploy --only hosting --project "$PROJECT" --debug 2>&1 | tee /tmp/deploy.log
          echo "Exit code: $?"

      - name: Save output to repo
        if: always()
        run: |
          mkdir -p deploy-logs
          cp /tmp/deploy.log deploy-logs/deploy.txt 2>/dev/null || echo "No log" > deploy-logs/deploy.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add deploy-logs/
          git diff --staged --quiet || git commit -m "log: firebase deploy output [skip ci]"
          git push || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa.json /tmp/deploy.log
