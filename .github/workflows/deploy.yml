name: Deploy L&T Equipcare to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         lntcmmb-intelligence.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          lntcmmb-intelligence
          VITE_FIREBASE_STORAGE_BUCKET:      lntcmmb-intelligence.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "37497109814"
          VITE_FIREBASE_APP_ID:              1:37497109814:web:eec6c70fc99f8264c6c797
          VITE_FIREBASE_MEASUREMENT_ID:      G-M3NH5FDXZ1

      - name: Deploy to Firebase Hosting
        run: |
          firebase target:apply hosting equipcare lntcmmb-equipcare \
            --project lntcmmb-intelligence1 2>/dev/null || true
          firebase deploy \
            --only hosting:equipcare \
            --project lntcmmb-intelligence1

      - name: Done
        run: echo "✅ Live at https://lntcmmb-equipcare.web.app"
