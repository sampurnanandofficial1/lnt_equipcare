name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         lntcmmb-equipcare-6cabd.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          lntcmmb-equipcare-6cabd
          VITE_FIREBASE_STORAGE_BUCKET:      lntcmmb-equipcare-6cabd.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1082472972328"
          VITE_FIREBASE_APP_ID:              1:1082472972328:web:a27b01504ff141cd9fb51d
          VITE_FIREBASE_MEASUREMENT_ID:      G-CQD1L58W6Z

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: firebase deploy --only hosting --project lntcmmb-equipcare-6cabd

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa.json

      - name: Live
        run: echo "✅ LIVE → https://lntcmmb-equipcare-6cabd.web.app"
