name: Deploy L&T Equipcare to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         lntcmmb-intelligence.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          lntcmmb-intelligence
          VITE_FIREBASE_STORAGE_BUCKET:      lntcmmb-intelligence.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "37497109814"
          VITE_FIREBASE_APP_ID:              1:37497109814:web:eec6c70fc99f8264c6c797
          VITE_FIREBASE_MEASUREMENT_ID:      G-M3NH5FDXZ1

      - name: Install Firebase Functions dependencies
        run: npm install
        working-directory: functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create Firebase Hosting site (if not exists)
        run: |
          firebase hosting:sites:create lntcmmb-equipcare \
            --project lntcmmb-intelligence1 2>/dev/null \
            && echo "✅ Site created" \
            || echo "ℹ️  Site already exists — continuing"
        continue-on-error: true

      - name: Apply hosting target
        run: |
          firebase target:apply hosting equipcare lntcmmb-equipcare \
            --project lntcmmb-intelligence1

      - name: Set Anthropic API key as Firebase secret
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | \
          firebase functions:secrets:set ANTHROPIC_API_KEY \
            --project lntcmmb-intelligence1 --force 2>/dev/null || true
        continue-on-error: true

      - name: Deploy Hosting + Functions to Firebase
        run: |
          firebase deploy \
            --only hosting:equipcare,functions \
            --project lntcmmb-intelligence1

      - name: Print live URL
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅  L&T Equipcare is LIVE on Firebase Hosting"
          echo "🌐  https://lntcmmb-equipcare.web.app"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
